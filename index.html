<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

<body>
    <div id="app">
        <header>
            <h1>Secret Message Generator</h1>
            <p>Type in the boxes below. Use the red magnifying glass to reveal the hidden message!</p>
        </header>

        <div class="input-container">
            <div class="input-group">
                <label for="scrambled-input">Scrambled Text (Red)</label>
                <textarea id="scrambled-input" rows="5">THISE ISW AJUMBLEF OF LETTERS ANDX WORDS TOD HIDES A MESSAGE.</textarea>
            </div>
            <div class="input-group">
                <label for="hidden-input">Hidden Message (Cyan)</label>
                <textarea id="hidden-input" rows="5">THIS IS A HIDDEN MESSAGE. YOU FOUND IT! GREAT JOB DETECTIVE!</textarea>
            </div>
        </div>

        <div id="output-container">
            <div id="output-scrambled" class="output-text"></div>
            <div id="output-hidden" class="output-text"></div>
        </div>

        <div id="decoder">
            <div class="decoder-lens"></div>
            <div class="decoder-handle"></div>
        </div>
    </div>
