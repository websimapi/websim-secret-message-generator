<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Consensus Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Collaborative Animation Frame</h1>
        <p>Each day, users propose the next frame of a shared animation. The most recent proposal for the day is shown.</p>
        
        <div id="viewer">
            <div id="image-container">
                <img id="consensusFrame" alt="Today's consensus frame">
            </div>
            <div id="day-selector">
                <button id="prevConsensus">&lt; Previous Day</button>
                <span id="day-display">Day ... of ...</span>
                <button id="nextConsensus">Next Day &gt;</button>
            </div>
        </div>

        <div id="controls">
            <h2>Propose Next Frame</h2>
            <div class="input-group">
                <label for="animPrompt">Animation Prompt (Optional)</label>
                <input type="text" id="animPrompt" placeholder="e.g., zoom in slightly, pan left, add rain...">
            </div>
            <button id="genNext">Generate & Propose Next Frame</button>
            <p id="status">Connecting...</p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/websim@0.0.8/dist/socket.js"></script>
    <script src="script.js" type="module"></script>

</body>
</html>
